<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #dfe9ff);
        }
        .card {
            width: 380px;
            background: #fff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }
        h1 {
            margin: 0 0 20px;
            color: #0d6efd;
            font-size: 28px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 12px;
            border-radius: 10px;
            background: #eef4ff;
            color: #0b3d91;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #d0d7e2;
            border-radius: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0d6efd;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #0d6efd;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="message">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}
        <form action="/register" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="number" step="0.01" min="0.01" name="balance" placeholder="Opening Balance" required>
            <button type="submit">Register</button>
        </form>
        <a href="/login">Already have an account? Login</a>
    </div>
</body>
</html>
